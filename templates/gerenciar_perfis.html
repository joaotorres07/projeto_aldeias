{% extends "base.html" %}
{% block title %}Gerenciar Perfis - Aldeias{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-shield-lock"></i> Gerenciar Perfis de Usuários</h2>

<div class="card p-4">
    <form method="POST">
        <div class="row g-3">
            <div class="col-12 col-md-3">
                <label class="form-label">CPF do Aldeeiro</label>
                <input type="text" class="form-control" id="cpf_aldeeiro" name="cpf_aldeeiro" required
                       maxlength="14" placeholder="000.000.000-00" oninput="mascaraCPF(this); buscarAldeeiro()">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label">Nome do Aldeeiro</label>
                <input type="text" class="form-control" id="nome_aldeeiro" disabled placeholder="Digite o CPF...">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label">Perfis</label>
                <select name="id_perfil" class="form-select" multiple size="{{ perfis|length }}" required>
                    {% for p in perfis %}
                    <option value="{{ p.id }}">{{ p.descricao }}</option>
                    {% endfor %}
                </select>
                <small class="text-muted">Segure Ctrl para selecionar múltiplos</small>
            </div>
            <div class="col-6 col-md-2">
                <label class="form-label">Ação</label>
                <select name="acao" class="form-select" required>
                    <option value="adicionar">Adicionar</option>
                    <option value="remover">Remover</option>
                </select>
            </div>
            <div class="col-6 col-md-1 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100" id="btn_executar" disabled>
                    <i class="bi bi-check-lg"></i>
                </button>
            </div>
        </div>
    </form>
</div>

<h5 class="mt-4 mb-3"><i class="bi bi-person-check"></i> Ativar / Desativar Aldeeiro</h5>
<div class="card p-4">
    <form method="POST" action="/admin/ativar-desativar" id="form_ativar">
        <div class="row g-3">
            <div class="col-12 col-md-3">
                <label class="form-label">CPF do Aldeeiro</label>
                <input type="text" class="form-control" id="cpf_ativar" name="cpf_aldeeiro" required
                       maxlength="14" placeholder="000.000.000-00" oninput="mascaraCPF(this); buscarAldeeiro2()">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label">Nome do Aldeeiro</label>
                <input type="text" class="form-control" id="nome_ativar" disabled placeholder="Digite o CPF...">
            </div>
            <div class="col-12 col-md-2">
                <label class="form-label">Status Atual</label>
                <input type="text" class="form-control" id="status_atual" disabled placeholder="-">
            </div>
            <div class="col-6 col-md-2">
                <label class="form-label">Ação</label>
                <select name="acao" class="form-select" id="select_acao_ativar" required>
                    <option value="ativar">Ativar</option>
                    <option value="desativar">Desativar</option>
                </select>
            </div>
            <div class="col-6 col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-warning w-100" id="btn_ativar" disabled>
                    <i class="bi bi-toggle-on"></i> Executar
                </button>
            </div>
        </div>
    </form>
</div>

<h5 class="mt-4 mb-3"><i class="bi bi-geo-alt"></i> Cadastrar / Atualizar Núcleo</h5>
<div class="card p-4">
    <div class="row mb-3">
        <div class="col-12 col-md-4">
            <label class="form-label">Ação</label>
            <select class="form-select" id="acao_nucleo_select" onchange="toggleAcaoNucleo()">
                <option value="cadastrar">Cadastrar Núcleo</option>
                <option value="atualizar">Atualizar Núcleo</option>
            </select>
        </div>
        <div class="col-12 col-md-4" id="div_select_nucleo" style="display:none;">
            <label class="form-label">Selecione o Núcleo</label>
            <select class="form-select" id="select_nucleo_existente" onchange="carregarNucleo()">
                <option value="">Selecione...</option>
                {% for n in nucleos %}
                    <option value="{{ n.id }}">{{ n.nome }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <form method="POST" action="/admin/cadastrar-nucleo" id="form_nucleo">
        <input type="hidden" name="acao_nucleo" id="acao_nucleo_hidden" value="cadastrar">
        <input type="hidden" name="nucleo_id" id="nucleo_id_hidden" value="">
        <div class="row g-3">
            <div class="col-12 col-md-4">
                <label class="form-label">Nome do Núcleo <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="nome_nucleo" id="nome_nucleo" required maxlength="50" placeholder="Ex: Belo Horizonte">
            </div>
            <div class="col-12 col-md-5">
                <label class="form-label">Endereço <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="endereco_nucleo" id="endereco_nucleo" required maxlength="200" placeholder="Endereço do local de reunião">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label">Dia/Horário Reunião <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="dias_reuniao" id="dias_reuniao" required maxlength="100" placeholder="Ex: Segunda e Quarta">
            </div>
            <div class="col-6 col-md-2">
                <label class="form-label">Ativo <span class="text-danger">*</span></label>
                <select class="form-select" name="ativo_nucleo" id="ativo_nucleo" required>
                    <option value="1" selected>Sim</option>
                    <option value="0">Não</option>
                </select>
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label">Motivo da Alteração <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="motivo_alteracao" id="motivo_alteracao" required maxlength="200" placeholder="Motivo da alteração">
            </div>
            <div class="col-12 col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-info text-white w-100" id="btn_nucleo">
                    <i class="bi bi-plus-circle"></i> Cadastrar
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
function mascaraCPF(campo) {
    let v = campo.value.replace(/\D/g, '').substring(0, 11);
    if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    campo.value = v;
}

let timeout = null;
function buscarAldeeiro() {
    clearTimeout(timeout);
    const cpfDigits = document.getElementById('cpf_aldeeiro').value.replace(/\D/g, '');
    const nomeField = document.getElementById('nome_aldeeiro');
    const btn = document.getElementById('btn_executar');

    if (cpfDigits.length < 11) {
        nomeField.value = '';
        nomeField.classList.remove('is-valid', 'is-invalid');
        btn.disabled = true;
        return;
    }

    timeout = setTimeout(() => {
        fetch('/admin/buscar-aldeeiro?cpf=' + encodeURIComponent(cpfDigits))
            .then(r => r.json().then(data => ({status: r.status, data})))
            .then(({status, data}) => {
                if (status === 200 && data.nome) {
                    nomeField.value = data.nome;
                    nomeField.classList.remove('is-invalid');
                    nomeField.classList.add('is-valid');
                    btn.disabled = false;
                } else {
                    nomeField.value = 'Aldeeiro não encontrado';
                    nomeField.classList.remove('is-valid');
                    nomeField.classList.add('is-invalid');
                    btn.disabled = true;
                }
            })
            .catch(() => {
                nomeField.value = 'Erro ao buscar';
                nomeField.classList.remove('is-valid');
                nomeField.classList.add('is-invalid');
                btn.disabled = true;
            });
    }, 400);
}

document.querySelector('form').addEventListener('submit', function() {
    var cpf = document.getElementById('cpf_aldeeiro');
    cpf.value = cpf.value.replace(/\D/g, '');
});

let timeout2 = null;
function buscarAldeeiro2() {
    clearTimeout(timeout2);
    const cpfDigits = document.getElementById('cpf_ativar').value.replace(/\D/g, '');
    const nomeField = document.getElementById('nome_ativar');
    const statusField = document.getElementById('status_atual');
    const btn = document.getElementById('btn_ativar');

    if (cpfDigits.length < 11) {
        nomeField.value = '';
        statusField.value = '-';
        nomeField.classList.remove('is-valid', 'is-invalid');
        btn.disabled = true;
        return;
    }

    timeout2 = setTimeout(() => {
        fetch('/admin/buscar-aldeeiro-status?cpf=' + encodeURIComponent(cpfDigits))
            .then(r => r.json().then(data => ({status: r.status, data})))
            .then(({status, data}) => {
                if (status === 200 && data.nome) {
                    nomeField.value = data.nome;
                    nomeField.classList.remove('is-invalid');
                    nomeField.classList.add('is-valid');
                    statusField.value = data.ativo ? 'Ativo' : 'Inativo';
                    statusField.className = 'form-control ' + (data.ativo ? 'text-success' : 'text-danger');
                    document.getElementById('select_acao_ativar').value = data.ativo ? 'desativar' : 'ativar';
                    btn.disabled = false;
                } else {
                    nomeField.value = 'Aldeeiro não encontrado';
                    nomeField.classList.remove('is-valid');
                    nomeField.classList.add('is-invalid');
                    statusField.value = '-';
                    statusField.className = 'form-control';
                    btn.disabled = true;
                }
            })
            .catch(() => {
                nomeField.value = 'Erro ao buscar';
                nomeField.classList.remove('is-valid');
                nomeField.classList.add('is-invalid');
                statusField.value = '-';
                btn.disabled = true;
            });
    }, 400);
}

document.getElementById('form_ativar').addEventListener('submit', function() {
    var cpf = document.getElementById('cpf_ativar');
    cpf.value = cpf.value.replace(/\D/g, '');
});

function toggleAcaoNucleo() {
    const acao = document.getElementById('acao_nucleo_select').value;
    const divSelect = document.getElementById('div_select_nucleo');
    const btn = document.getElementById('btn_nucleo');
    const hidden = document.getElementById('acao_nucleo_hidden');
    const motivo = document.getElementById('motivo_alteracao');

    hidden.value = acao;

    if (acao === 'atualizar') {
        divSelect.style.display = '';
        btn.innerHTML = '<i class="bi bi-pencil-square"></i> Atualizar';
        btn.classList.remove('btn-info');
        btn.classList.add('btn-warning');
        motivo.required = true;
        document.getElementById('select_nucleo_existente').value = '';
        limparCamposNucleo();
    } else {
        divSelect.style.display = 'none';
        btn.innerHTML = '<i class="bi bi-plus-circle"></i> Cadastrar';
        btn.classList.remove('btn-warning');
        btn.classList.add('btn-info');
        motivo.required = false;
        document.getElementById('select_nucleo_existente').value = '';
        limparCamposNucleo();
    }
}

function limparCamposNucleo() {
    document.getElementById('nome_nucleo').value = '';
    document.getElementById('endereco_nucleo').value = '';
    document.getElementById('dias_reuniao').value = '';
    document.getElementById('ativo_nucleo').value = '1';
    document.getElementById('motivo_alteracao').value = '';
    document.getElementById('nucleo_id_hidden').value = '';
}

function carregarNucleo() {
    const nucleoId = document.getElementById('select_nucleo_existente').value;
    if (!nucleoId) {
        limparCamposNucleo();
        return;
    }

    fetch('/admin/buscar-nucleo?id=' + encodeURIComponent(nucleoId))
        .then(r => r.json())
        .then(data => {
            if (data.id) {
                document.getElementById('nucleo_id_hidden').value = data.id;
                document.getElementById('nome_nucleo').value = data.nome || '';
                document.getElementById('endereco_nucleo').value = data.endereco || '';
                document.getElementById('dias_reuniao').value = data.dias_reuniao || '';
                document.getElementById('ativo_nucleo').value = data.ativo ? '1' : '0';
                document.getElementById('motivo_alteracao').value = '';
            }
        })
        .catch(() => {
            limparCamposNucleo();
        });
}
</script>
{% endblock %}
