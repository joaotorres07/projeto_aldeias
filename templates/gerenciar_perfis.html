{% extends "base.html" %}
{% block title %}Gerenciar Perfis - Aldeias{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-shield-lock"></i> Gerenciar Perfis de Usuários</h2>

<div class="card p-4">
    <form method="POST">
        <div class="row g-3">
            <div class="col-12 col-md-3">
                <label class="form-label">CPF do Aldeeiro</label>
                <input type="text" class="form-control" id="cpf_aldeeiro" name="cpf_aldeeiro" required
                       maxlength="14" placeholder="000.000.000-00" oninput="mascaraCPF(this); buscarAldeeiro()">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label">Nome do Aldeeiro</label>
                <input type="text" class="form-control" id="nome_aldeeiro" disabled placeholder="Digite o CPF...">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label">Perfis</label>
                <select name="id_perfil" class="form-select" multiple size="{{ perfis|length }}" required>
                    {% for p in perfis %}
                    <option value="{{ p.id }}">{{ p.descricao }}</option>
                    {% endfor %}
                </select>
                <small class="text-muted">Segure Ctrl para selecionar múltiplos</small>
            </div>
            <div class="col-6 col-md-2">
                <label class="form-label">Ação</label>
                <select name="acao" class="form-select" required>
                    <option value="adicionar">Adicionar</option>
                    <option value="remover">Remover</option>
                </select>
            </div>
            <div class="col-6 col-md-1 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100" id="btn_executar" disabled>
                    <i class="bi bi-check-lg"></i>
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
function mascaraCPF(campo) {
    let v = campo.value.replace(/\D/g, '').substring(0, 11);
    if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    campo.value = v;
}

let timeout = null;
function buscarAldeeiro() {
    clearTimeout(timeout);
    const cpfDigits = document.getElementById('cpf_aldeeiro').value.replace(/\D/g, '');
    const nomeField = document.getElementById('nome_aldeeiro');
    const btn = document.getElementById('btn_executar');

    if (cpfDigits.length < 11) {
        nomeField.value = '';
        nomeField.classList.remove('is-valid', 'is-invalid');
        btn.disabled = true;
        return;
    }

    timeout = setTimeout(() => {
        fetch('/admin/buscar-aldeeiro?cpf=' + encodeURIComponent(cpfDigits))
            .then(r => r.json().then(data => ({status: r.status, data})))
            .then(({status, data}) => {
                if (status === 200 && data.nome) {
                    nomeField.value = data.nome;
                    nomeField.classList.remove('is-invalid');
                    nomeField.classList.add('is-valid');
                    btn.disabled = false;
                } else {
                    nomeField.value = 'Aldeeiro não encontrado';
                    nomeField.classList.remove('is-valid');
                    nomeField.classList.add('is-invalid');
                    btn.disabled = true;
                }
            })
            .catch(() => {
                nomeField.value = 'Erro ao buscar';
                nomeField.classList.remove('is-valid');
                nomeField.classList.add('is-invalid');
                btn.disabled = true;
            });
    }, 400);
}

document.querySelector('form').addEventListener('submit', function() {
    var cpf = document.getElementById('cpf_aldeeiro');
    cpf.value = cpf.value.replace(/\D/g, '');
});
</script>
{% endblock %}
